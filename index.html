<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRM Phước Quang — Quản lý KPI, Lương & Khách hàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16263f; --navy-2:#1f3553; --navy-3:#2c4a72;
  --navy-light:#34507a; --gold:#c9a227; --gold-soft:#e3c766;
  --ink:#1a2233; --muted:#6b7689; --line:#e4e2db; --line-2:#eceae3;
  --bg:#f6f4ee; --bg-card:#fffdf8; --white:#ffffff;
  --green:#2f8f5b; --green-bg:#e3f3e9; --amber:#c98a16; --amber-bg:#fbf0d8;
  --red:#c0392b; --red-bg:#fae5e2; --blue:#2b6cb0; --blue-bg:#e4eef8;
  --shadow:0 1px 2px rgba(22,38,63,.04), 0 4px 18px rgba(22,38,63,.06);
  --shadow-lg:0 8px 40px rgba(22,38,63,.14);
  --radius:14px; --radius-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Be Vietnam Pro',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em;line-height:1.2}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfcabb;border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;background:linear-gradient(170deg,var(--navy) 0%,#0f1b2e 100%);
  color:#cdd6e4;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:30;
  box-shadow:4px 0 24px rgba(0,0,0,.08)
}
.brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{display:flex;align-items:center;gap:11px}
.brand .mark{
  width:38px;height:38px;border-radius:10px;flex:none;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  display:grid;place-items:center;color:var(--navy);font-family:'Fraunces',serif;
  font-weight:700;font-size:19px;box-shadow:0 4px 12px rgba(201,162,39,.3)
}
.brand .name{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:-.02em}
.brand .sub{font-size:11px;color:#8b97aa;margin-top:1px;letter-spacing:.02em}
.nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-group{margin-bottom:6px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#67748a;padding:14px 12px 7px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;
  color:#bcc7d8;font-size:13.5px;font-weight:500;transition:all .16s;width:100%;text-align:left;margin-bottom:2px
}
.nav-item svg{width:18px;height:18px;flex:none;opacity:.8}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(201,162,39,.18),rgba(201,162,39,.04));color:#fff}
.nav-item.active svg{opacity:1;color:var(--gold-soft)}
.nav-item.active{box-shadow:inset 3px 0 0 var(--gold)}
.sidebar-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#67748a}

.main{flex:1;margin-left:248px;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:rgba(246,244,238,.85);backdrop-filter:blur(10px);
  padding:0 32px;height:66px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20
}
.topbar .page-title{font-size:22px}
.topbar .page-sub{font-size:12.5px;color:var(--muted);margin-top:1px;font-family:'Be Vietnam Pro',sans-serif;font-weight:400}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{padding:28px 32px 60px;flex:1}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;
  font-size:13.5px;font-weight:600;transition:all .15s;white-space:nowrap;border:1px solid transparent
}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--navy);color:#fff;box-shadow:var(--shadow)}
.btn-primary:hover{background:var(--navy-2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8941f);color:#fff;box-shadow:0 4px 14px rgba(201,162,39,.28)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,162,39,.4)}
.btn-ghost{background:var(--white);color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--navy-light);color:var(--navy)}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-danger:hover{background:#f5d5d0}
.btn-icon{padding:7px;border-radius:7px;color:var(--muted);background:transparent}
.btn-icon:hover{background:var(--line-2);color:var(--navy)}
.btn-icon svg{width:17px;height:17px}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:22px}
.card-head{padding:18px 22px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between;gap:14px}
.card-head h3{font-size:17px}
.card-head .hint{font-size:12px;color:var(--muted);font-family:'Be Vietnam Pro',sans-serif;font-weight:400;margin-top:2px}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat{
  background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow)
}
.stat::after{content:"";position:absolute;right:-20px;top:-20px;width:90px;height:90px;border-radius:50%;opacity:.07}
.stat.s-navy::after{background:var(--navy)} .stat.s-gold::after{background:var(--gold)}
.stat.s-green::after{background:var(--green)} .stat.s-red::after{background:var(--red)}
.stat .label{font-size:12.5px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:8px}
.stat .label svg{width:16px;height:16px}
.stat .value{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin-top:10px;letter-spacing:-.02em}
.stat .meta{font-size:12px;margin-top:6px;color:var(--muted)}
.stat .meta b{font-weight:600}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{
  background:#f0ede4;color:var(--navy);font-weight:600;text-align:left;padding:11px 14px;
  border-bottom:2px solid var(--line);white-space:nowrap;font-size:12.5px;position:sticky;top:0
}
thead th.num,td.num{text-align:right}
thead th.ctr,td.ctr{text-align:center}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tbody tr:hover{background:#faf8f2}
tbody tr:last-child td{border-bottom:none}
td .nm{font-weight:600;color:var(--ink)}
td .sub{font-size:12px;color:var(--muted)}
.empty{padding:48px 20px;text-align:center;color:var(--muted)}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.b-loai1{background:#eef6f0;color:#1f7a47} .b-loai2{background:#e4eef8;color:#2161a0}
.b-loai3{background:#fbf0d8;color:#9a6c0f} .b-loai4{background:#f6ece1;color:#9a5a23}
.b-loai5{background:#f3eef7;color:#7a4f9e}
.b-loaiDB{background:linear-gradient(135deg,#fbf0d8,#fce8b5);color:#9a6c0f;font-weight:700;border:1px solid #d4a72c}
.db-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 5px 5px 11px;background:linear-gradient(135deg,#fbf0d8,#fef3d6);border:1px solid var(--gold);border-radius:18px;font-size:12.5px;color:#9a6c0f;font-weight:600}
.db-chip-active{box-shadow:0 1px 3px rgba(201,162,39,.25)}
.db-chip-x{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:none;background:rgba(154,108,15,.12);color:#9a6c0f;cursor:pointer;padding:0}
.db-chip-x:hover{background:rgba(154,108,15,.25)}
.db-chip-x svg{width:11px;height:11px}
.dg-db-inline,.phi-inline{width:100%;min-width:95px;padding:6px 8px;border:1px solid transparent;border-radius:6px;background:transparent;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;font-family:inherit;transition:all .14s}
.dg-db-inline{font-weight:700;color:#9a6c0f;background:#fbf0d8}
.dg-db-inline:hover{background:#fce8b5;border-color:var(--gold)}
.dg-db-inline:focus{outline:none;border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(212,167,44,.18)}
.phi-inline:hover{background:#faf8f2}
.phi-inline:focus{outline:none;border-color:var(--navy-light);background:var(--white);box-shadow:0 0 0 2px rgba(52,80,122,.12)}
.period-sel{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 14px;background:#faf8f2;border-radius:10px;border:1px solid var(--line-2);margin-bottom:14px}
.period-sel .chip-row{flex-wrap:nowrap}
.period-sel .chip{padding:5px 12px;font-size:12.5px}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.rep-card{background:var(--bg-card);border-radius:14px;padding:22px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:12px;transition:all .15s;border:1px solid var(--line-2)}
.rep-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.07);transform:translateY(-2px)}
.rep-card .rep-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#fef9ea,#fef3d6);display:grid;place-items:center;color:#9a6c0f}
.rep-card .rep-icon svg{width:22px;height:22px}
.rep-card .rep-title{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.rep-card .rep-stat{font-size:12.5px;color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums}
.rep-card .rep-desc{font-size:12.5px;color:var(--muted);line-height:1.6;flex:1}
.rep-icon{width:20px;height:20px}
.b-green{background:var(--green-bg);color:var(--green)} .b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)} .b-gray{background:#eceae3;color:var(--muted)}
.kpi-pill{font-family:'Fraunces',serif;font-weight:700;font-size:14px;padding:4px 12px;border-radius:8px}

/* Forms */
.form-grid{display:grid;gap:16px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:12.5px;font-weight:600;color:var(--navy-2)}
.fld .req{color:var(--red)}
.fld input,.fld select,.fld textarea{
  padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--white);
  transition:all .15s;width:100%
}
.fld input:focus,.fld select:focus,.fld textarea:focus{
  outline:none;border-color:var(--navy-light);box-shadow:0 0 0 3px rgba(52,80,122,.12)
}
.fld .help{font-size:11.5px;color:var(--muted)}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fld-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(16,26,42,.55);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow-y:auto
}
.modal{
  background:var(--bg);border-radius:18px;width:100%;max-width:680px;box-shadow:var(--shadow-lg);
  animation:pop .22s cubic-bezier(.2,.8,.2,1)
}
.modal.wide{max-width:1080px}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border-radius:18px 18px 0 0}
.modal-head h3{font-size:19px}
.modal-body{padding:24px 26px;max-height:65vh;overflow-y:auto}
.modal-foot{padding:16px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:var(--bg-card);border-radius:0 0 18px 18px}

/* Tabs (settings) */
.subtabs{display:flex;gap:4px;background:var(--line-2);padding:4px;border-radius:11px;margin-bottom:20px;flex-wrap:wrap}
.subtab{padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s}
.subtab.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow)}

/* Section title */
.sec-title{display:flex;align-items:center;gap:10px;margin:26px 0 14px;font-size:15px;color:var(--navy)}
.sec-title:first-child{margin-top:0}
.sec-title .ln{flex:1;height:1px;background:var(--line)}

/* misc */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.search{position:relative;flex:1;min-width:200px;max-width:340px}
.search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:9px;background:var(--white)}
.search input:focus{outline:none;border-color:var(--navy-light);box-shadow:0 0 0 3px rgba(52,80,122,.1)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.chip-row{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;background:var(--white);border:1px solid var(--line);color:var(--muted);transition:all .14s}
.chip:hover{border-color:var(--navy-light)}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.money{font-variant-numeric:tabular-nums;font-weight:600}
.money.neg{color:var(--red)} .money.pos{color:var(--green)}
.muted{color:var(--muted)}
.tiny{font-size:11.5px}
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow-lg);z-index:200;opacity:0;transition:all .3s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;gap:9px
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{width:18px;height:18px;color:var(--gold-soft)}
.bar{height:7px;background:var(--line-2);border-radius:5px;overflow:hidden;min-width:60px}
.bar>i{display:block;height:100%;border-radius:5px;transition:width .4s}
.pwd-cell{display:flex;align-items:center;gap:6px}
.pwd-dots{letter-spacing:2px;color:var(--muted)}
.mini-link{color:var(--blue);font-size:12px;text-decoration:none;font-weight:500}
.mini-link:hover{text-decoration:underline}
details.acc{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--white);overflow:hidden}
details.acc>summary{padding:13px 16px;font-weight:600;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;font-size:13.5px}
details.acc>summary::-webkit-details-marker{display:none}
details.acc[open]>summary{border-bottom:1px solid var(--line-2);background:#faf8f2}
details.acc .acc-body{padding:16px}
.kpi-mini-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.kpi-mini{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:13px}
.kpi-mini .l{font-size:11.5px;color:var(--muted);font-weight:500}
.kpi-mini .v{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin-top:4px}
.hide{display:none!important}
@media(max-width:880px){
  .sidebar{transform:translateX(-100%);transition:transform .25s} .sidebar.open{transform:none}
  .main{margin-left:0} .content{padding:18px} .topbar{padding:0 18px}
  .fld-row,.fld-row-3{grid-template-columns:1fr}
}
.menu-toggle{display:none}
@media(max-width:880px){.menu-toggle{display:inline-flex}}

/* Login screen */
body.auth-mode{background:linear-gradient(160deg,#16263f 0%,#0a1426 100%);min-height:100vh}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
.login-card{background:var(--bg-card);border-radius:18px;padding:36px 38px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:pop .35s cubic-bezier(.2,.8,.2,1)}
.login-logo{display:flex;align-items:center;gap:13px;padding-bottom:18px;border-bottom:1px solid var(--line-2)}
.login-logo .mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:grid;place-items:center;color:var(--navy);font-family:'Fraunces',serif;font-weight:700;font-size:22px;box-shadow:0 6px 16px rgba(201,162,39,.35)}
.login-logo .ttl{font-family:'Fraunces',serif;font-size:21px;font-weight:700;color:var(--navy);letter-spacing:-.02em}
.login-logo .sub{font-size:11.5px;color:var(--muted);margin-top:1px}
.login-err{color:var(--red);font-size:12.5px;min-height:18px;margin-bottom:8px;font-weight:500}
.login-hint{margin-top:18px;padding:13px 15px;background:var(--blue-bg);color:#1c4e80;border-radius:9px;font-size:12.5px;line-height:1.55}
.login-hint code{background:#fff;padding:1px 7px;border-radius:5px;font-weight:600;color:var(--navy);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.login-foot{margin-top:24px;font-size:11.5px;color:#7a8aa1}

/* User card in sidebar */
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.05);border-radius:10px;margin-top:-4px}
.user-card .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8941f);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;flex:none}
.user-card .nm-line{color:#fff;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-card .role-line{font-size:10.5px;color:#8b97aa;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Permission chip checkboxes */
.perm-chip{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--white);border:1px solid var(--line);border-radius:9px;cursor:pointer;font-size:13px;transition:all .14s;user-select:none}
.perm-chip:hover{border-color:var(--navy-light)}
.perm-chip:has(input:checked){background:#e8efef;border-color:var(--green);color:var(--green)}
.perm-chip input{accent-color:var(--green);width:15px;height:15px;cursor:pointer}

/* Inline note input in debt table */
.ghi-chu-inline{width:100%;padding:6px 8px;border:1px solid transparent;border-radius:6px;background:transparent;font-size:13px;transition:all .14s}
.ghi-chu-inline:hover{background:#faf8f2}
.ghi-chu-inline:focus{outline:none;border-color:var(--navy-light);background:var(--white);box-shadow:0 0 0 3px rgba(52,80,122,.1)}
.tax-tbl input.tax-num{width:100%;min-width:90px;padding:5px 7px;border:1px solid transparent;border-radius:6px;background:transparent;font-size:12.5px;text-align:right;font-variant-numeric:tabular-nums;transition:all .14s}
.tax-tbl input.tax-num:hover{background:#faf8f2}
.tax-tbl input.tax-num:focus{outline:none;border-color:var(--navy-light);background:var(--white);box-shadow:0 0 0 2px rgba(52,80,122,.12)}
.tax-tbl input.tax-note{width:100%;min-width:120px;padding:5px 7px;border:1px solid transparent;border-radius:6px;background:transparent;font-size:12.5px;transition:all .14s}
.tax-tbl input.tax-note:hover{background:#faf8f2}
.tax-tbl input.tax-note:focus{outline:none;border-color:var(--navy-light);background:var(--white);box-shadow:0 0 0 2px rgba(52,80,122,.12)}
.tax-tbl input.tax-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}

function svg(p,cls){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${cls?`class="${cls}"`:''}>${p}</svg>`}

/* ---------- Storage ---------- */
const DB_KEY='hrm_pq_v1';
let DB=null;

function defaultDB(){
  return {
    settings:{
      donGia:{1:1000000,2:700000,3:400000,4:200000,5:150000,DB:0},

    },

      {id:'NV01',hoTen:'Nguyễn Thị Ngọc Trân',viTri:'Kế toán',luongCoBan:6500000,luongBHXH:5400000,soTK:'0631000480981',nganHang:'Vietcombank'}
    ],
    customers:[],  // {... ghiChuCongNo}
    revenues:[],   // {id, customerId, thang:'YYYY-MM', doanhThu, gtgt, tncn, tndn, ghiChu}
    debtTxns:[],   // {id, customerId, ngay:'YYYY-MM-DD', loai:'phatsinh'|'thanhtoan', soTien, noiDung}
    kpiRecords:[], // {id, employeeId, thang, rows:[{customerId,a1m,a1b,a2:[5],a3:[2],a4:[3],a5:[2]}], mucB, mucC:[4], mucD:[3], luong:{...}}  scores có thể là number hoặc {s,m}
    taxReports:[], // {id, customerId, ky:'YYYY-Q', bcThang, bcQuy, nopTC, doanhThu, gtgt, tncn, tndn, noThue, laiLo, ghiChu}
    walkinCustomers:[], // {id, ten, diaChi, mst, nguoiLienHe, dienThoai, noiDungCongViec, phiDichVu, daThanhToan, congNo, ghiChu, ngayTao}
    cashbook:[],        // {id, soct, ngay, thu, chi, tonQuy, ghiChu}

/* ---------- Authentication & permissions ---------- */
let CURRENT_USER = null;
let IMPERSONATED_USER = null;
const SESSION_KEY = 'hrm_pq_session';
const ALL_PAGES = ['dashboard','customersAll','customersMine','walkin','cashbook','debt','taxReport','kpi','kpiSummary','journal'];

/** Backward-compatible: when user has legacy `customers:true`, treat as customersAll */
function getUserPerm(u, perm){
  if(!u||!u.permissions) return false;
  const p=u.permissions;
  if(perm==='customersAll') return p.customersAll===true || (p.customersAll===undefined && p.customers===true);
  if(perm==='customersMine') return p.customersMine===true;
  if(perm==='customers') return p.customers===true || p.customersAll===true || p.customersMine===true;
  return p[perm]!==false;
}

/** Returns customers the effective user can see based on their scope perms */
function visibleCustomers(){
  const u=effectiveUser(); if(!u) return [];
  if(isAdmin()&&!isImpersonating()) return DB.customers;
  if(getUserPerm(u,'customersAll')) return DB.customers;
  if(getUserPerm(u,'customersMine')) return DB.customers.filter(c=>c.chuyenVienId===u.employeeId);
  return [];
}
function canViewCustomer(custId){
  const list=visibleCustomers();
  return list.some(c=>c.id===custId);
}
function defaultPerms(){ const p={}; ALL_PAGES.forEach(k=>p[k]=true); return p; }

async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function ensureAdmin(){
  if(!DB.users) DB.users=[];
  if(!DB.users.some(u=>u.role==='admin')){
    DB.users.unshift({
      id: uid(),
      username: 'admin',
      passwordHash: await sha256('admin123'),
      hoTen: 'Quản trị viên',
      role: 'admin',
      permissions: defaultPerms(),
      employeeId: null,
      active: true,
      mustChangePassword: true,
      createdAt: todayDate()
    });
    save();
  }
}

async function attemptLogin(username, password){
  const u = DB.users.find(x=>x.username===username && x.active!==false);
  if(!u) return {ok:false, msg:'Tên đăng nhập không tồn tại hoặc đã bị khóa'};
  const h = await sha256(password);
  if(u.passwordHash !== h) return {ok:false, msg:'Sai mật khẩu'};
  CURRENT_USER = u;
  localStorage.setItem(SESSION_KEY, u.id);
  return {ok:true, user:u};
}

function logout(){
  CURRENT_USER = null;
  localStorage.removeItem(SESSION_KEY);
  renderLogin();
}

function restoreSession(){
  const sid = localStorage.getItem(SESSION_KEY);
  if(!sid) return false;
  const u = DB.users.find(x=>x.id===sid && x.active!==false);
  if(!u){ localStorage.removeItem(SESSION_KEY); return false; }
  CURRENT_USER = u;
  return true;
}

function isAdmin(){ const u=effectiveUser(); return !!u && u.role==='admin'; }
function isRealAdmin(){ return CURRENT_USER && CURRENT_USER.role==='admin'; }
function effectiveUser(){ return IMPERSONATED_USER || CURRENT_USER; }
function isImpersonating(){ return !!IMPERSONATED_USER; }
function startImpersonate(userId){
  if(!isRealAdmin()){toast('Chỉ quản trị viên mới có thể xem dưới góc nhìn');return}
  const u=DB.users.find(x=>x.id===userId);
  if(!u){toast('Không tìm thấy người dùng');return}
  if(u.id===CURRENT_USER.id){toast('Bạn đang đăng nhập bằng tài khoản này rồi');return}
  IMPERSONATED_USER=u;
  go('dashboard');
  toast('Đang xem dưới góc nhìn: '+u.hoTen);
}
function exitImpersonate(){
  IMPERSONATED_USER=null;
  go('dashboard');
  toast('Đã quay lại tài khoản quản trị');
}
function canAccess(pageId){
  const u=effectiveUser();
  if(!u) return false;
  if(pageId==='settings' || pageId==='users' || pageId==='employees' || pageId==='reports') return u.role==='admin' && !isImpersonating();
  if(u.role==='admin'&&!isImpersonating()) return true;
  if(pageId==='customers') return getUserPerm(u,'customersAll')||getUserPerm(u,'customersMine');
  if(pageId==='customersAll'||pageId==='customersMine') return getUserPerm(u,pageId);
  const p = u.permissions || {};
  return p[pageId] !== false;
}

/* ---------- Password reset requests ---------- */
function genResetCode(){
  const c=Math.floor(100000+Math.random()*900000);
  return String(c).slice(0,3)+'-'+String(c).slice(3);
}
function createResetRequest(userId){
  if(!DB.passwordResetRequests) DB.passwordResetRequests=[];
  // Remove old requests for this user
  DB.passwordResetRequests = DB.passwordResetRequests.filter(r=>r.userId!==userId);
  const req={id:uid(), userId, code:genResetCode(), createdAt:new Date().toISOString(), status:'pending'};
  DB.passwordResetRequests.push(req);
  save();
  return req;
}

function load(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(raw){DB=JSON.parse(raw);}
    else{DB=defaultDB();seedFromExcel();save();}
  }catch(e){DB=defaultDB();}
  // migration safety
  const d=defaultDB();
  DB.settings=Object.assign({},d.settings,DB.settings||{});
  // Ensure donGia.DB exists for users upgrading from older versions
  if(DB.settings.donGia && DB.settings.donGia.DB===undefined) DB.settings.donGia.DB=0;
  ['users','employees','customers','revenues','debtTxns','kpiRecords','taxReports','walkinCustomers','cashbook','journal','passwordResetRequests'].forEach(k=>{if(!DB[k])DB[k]=d[k]});
}
function save(){localStorage.setItem(DB_KEY,JSON.stringify(DB));updateStorageInfo()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

/* ---------- Helpers ---------- */
function fmt(n){if(n===''||n==null||isNaN(n))return '—';return Math.round(n).toLocaleString('vi-VN')}
function fmtMoney(n,withSign){
  if(n===''||n==null||isNaN(n))return '<span class="muted">—</span>';
  const cls=n<0?'neg':(withSign&&n>0?'pos':'');
  return `<span class="money ${cls}">${Math.round(n).toLocaleString('vi-VN')}</span>`;
}
function num(v){if(v==null||v==='')return 0;const s=String(v).trim().replace(/[.\s]/g,'').replace(/,/g,'.');const n=parseFloat(s);return isNaN(n)?0:n}
function pct(n){return (Math.round(n*10)/10).toLocaleString('vi-VN')}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function monthLabel(m){if(!m)return '';const[y,mo]=m.split('-');return `T${mo}/${y}`}

/* ---------- Period selector helpers (used by Revenue & Tax Report) ----------
   period state: {type:'month'|'quarter'|'year'|'range', m:'YYYY-MM', q:'YYYY-QN', y:'YYYY', from:'YYYY-MM-DD', to:'YYYY-MM-DD'}  */
function defaultPeriod(type){
  const d=new Date(), y=d.getFullYear(), mo=String(d.getMonth()+1).padStart(2,'0');
  const q=Math.ceil((d.getMonth()+1)/3);
  return {type:type||'month',m:`${y}-${mo}`,q:`${y}-Q${q}`,y:String(y),from:'',to:''};
}
function periodLabel(p){
  if(!p)return '';
  if(p.type==='month')return p.m?monthLabel(p.m):'—';
  if(p.type==='quarter')return p.q?p.q.replace('-Q',' · Quý '):'—';
  if(p.type==='year')return p.y?`Năm ${p.y}`:'—';
  if(p.type==='range')return p.from&&p.to?`${fmtDate(p.from)} → ${fmtDate(p.to)}`:'—';
  return '';
}
/** Check whether a record's date key matches the selected period.
    @param recKy: 'YYYY-MM' (revenue.thang or tax legacy) OR 'YYYY-Q*' (tax legacy)
    @param recDate: optional 'YYYY-MM-DD' for date-range matching */
function periodMatches(p, recKy, recDate){
  if(!p||!recKy)return false;
  const [ry,rm]=String(recKy).split('-');  // ry='2026', rm='05' or 'Q2'
  const rq = rm && rm.startsWith('Q') ? rm : (rm ? `Q${Math.ceil(parseInt(rm,10)/3)}` : null);
  if(p.type==='month'){ const [py,pm]=(p.m||'').split('-'); return ry===py && rm===pm }
  if(p.type==='quarter'){ const [py,pq]=(p.q||'').split('-Q'); return ry===py && rq===`Q${pq}` }
  if(p.type==='year'){ return ry===p.y }
  if(p.type==='range'){
    if(!recDate){ // approximate using month start
      if(rm && rm.startsWith('Q')){
        const qn=parseInt(rm.slice(1));
        recDate=`${ry}-${String((qn-1)*3+1).padStart(2,'0')}-01`;
      }else{
        recDate=`${ry}-${rm||'01'}-01`;
      }
    }
    return recDate>=p.from && recDate<=p.to;
  }
  return false;
}
function renderPeriodSelector(stateKey, p){
  const types=[['month','Tháng'],['quarter','Quý'],['year','Năm'],['range','Từ ngày → đến ngày']];
  const setType=`(t)=>{UIST.${stateKey}.type=t;render()}`;
  let inputs='';
  if(p.type==='month'){
    inputs=`<input type="month" value="${esc(p.m||'')}" onchange="UIST.${stateKey}.m=this.value;render()" style="padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px">`;
  }else if(p.type==='quarter'){
    const cur=new Date(), curY=cur.getFullYear();
    const ys=[curY+1,curY,curY-1,curY-2];
    inputs=`<select onchange="UIST.${stateKey}.q=this.value;render()" style="padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px">

  }
  return `<div class="period-sel">
    <div class="chip-row" style="margin-bottom:0">
      ${types.map(([t,lb])=>`<button class="chip ${p.type===t?'active':''}" onclick="UIST.${stateKey}.type='${t}';render()">${lb}</button>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:8px">${inputs}</div>
  </div>`;
}

/* ---------- Calculation engine ---------- */
function donGiaOf(loai){return DB.settings.donGia[loai]||0}
function donGiaCustomer(cust){
  if(!cust) return 0;
  if(cust.xepLoai==='DB') return num(cust.donGiaDB)||num(DB.settings.donGia.DB)||0;
  return DB.settings.donGia[cust.xepLoai]||0;
}

/* Score helpers — each score field can be:
   - a number (legacy / single value, treated as both NV and QL same)
   - {s, m}  where s = nhân viên tự đánh giá, m = quản lý đánh giá
   - '' or null (blank → excluded from average) */
function S(v){ if(v==null||v==='') return v; return (typeof v==='object') ? v.s : v; }
function M(v){ if(v==null||v==='') return v; return (typeof v==='object') ? v.m : v; }
function mkScore(s, m){
  if((s===''||s==null) && (m===''||m==null)) return '';
  // If mgr blank but self has value → fall back to self
  const mVal = (m===''||m==null) ? s : m;
  return {s: (s===''||s==null)?'':num(s), m: (mVal===''||mVal==null)?'':num(mVal)};
}

function calcCustomerKPISide(row, side){
  const get = side==='m' ? M : S;
  const w=DB.settings.wA;
  const A1=avg([get(row.a1m),get(row.a1b)]);
  const A2=avg((row.a2||[]).map(get));
  const A3=avg((row.a3||[]).map(get));
  const A4=avg((row.a4||[]).map(get));
  const A5=avg((row.a5||[]).map(get));
  const total=A1*w.A1+A2*w.A2+A3*w.A3+A4*w.A4+A5*w.A5;
  return {A1,A2,A3,A4,A5,total};
}
/* Backward-compat shim: legacy callers default to manager side */
function calcCustomerKPI(row){ return calcCustomerKPISide(row,'m'); }
function calcMucC(arr){const w=DB.settings.wC;const[c1,c2,c3,c4]=arr.map(num);return c1*w.C1+c2*w.C2+c3*w.C3+c4*w.C4}
function calcMucD(arr){const w=DB.settings.wD;const[d1,d2,d3]=arr.map(num);return d1*w.D1+d2*w.D2+d3*w.D3}

function rateForScore(score){
  const t=[...DB.settings.thangDiem].sort((a,b)=>a.min-b.min);
  let r=0;for(const row of t){if(score>=row.min)r=row.rate}return r;
}

function calcKPI(rec){
  const tt=DB.settings.tyTrong;
  const rows=(rec.rows||[]).filter(r=>r.customerId);
  // Per-customer for both sides
  const perCust=rows.map(r=>({
    customerId:r.customerId,
    s:calcCustomerKPISide(r,'s'),
    m:calcCustomerKPISide(r,'m')
  }));
  const mucA_s = perCust.length ? avg(perCust.map(p=>p.s.total)) : 0;
  const mucA_m = perCust.length ? avg(perCust.map(p=>p.m.total)) : 0;
  const mucB_s = num(S(rec.mucB));
  const mucB_m = num(M(rec.mucB));
  const mucC_s = calcMucC((rec.mucC||[0,0,0,0]).map(S));
  const mucC_m = calcMucC((rec.mucC||[0,0,0,0]).map(M));
  const mucD_s = calcMucD((rec.mucD||[0,0,0]).map(S));
  const mucD_m = calcMucD((rec.mucD||[0,0,0]).map(M));
  const tongKPI_s = mucA_s*tt.A + mucB_s*tt.B + mucC_s*tt.C + mucD_s*tt.D;
  const tongKPI_m = mucA_m*tt.A + mucB_m*tt.B + mucC_m*tt.C + mucD_m*tt.D;
  // Salary uses manager-side (yêu cầu nghiệp vụ)
  const sumDonGia=rows.reduce((s,r)=>{const c=DB.customers.find(c=>c.id===r.customerId);return s+(c?donGiaCustomer(c):0)},0);
  const rate=rateForScore(mucA_m);
  const luongSP=rate*sumDonGia;
  const emp=DB.employees.find(e=>e.id===rec.employeeId)||DB.employees[0]||{luongCoBan:0,luongBHXH:0};
  const L=rec.luong||{};
  const phuCap=num(L.phuCap),nghiKP=num(L.nghiKhongPhep),quyPL=num(L.quyPhucLoi);
  const bhxhTru=(emp.luongBHXH||0)*DB.settings.bhxhRate;
  const truNghi=(emp.luongCoBan||0)/30*nghiKP;
  const thucLanh=(emp.luongCoBan||0)+luongSP+phuCap-truNghi-bhxhTru-quyPL;
  return {
    perCust,
    // Manager-side (used for salary):
    mucA:mucA_m, mucB:mucB_m, mucC:mucC_m, mucD:mucD_m, tongKPI:tongKPI_m,
    // Also expose both sides explicitly:
    mucA_s, mucB_s, mucC_s, mucD_s, tongKPI_s,
    mucA_m, mucB_m, mucC_m, mucD_m, tongKPI_m,
    sumDonGia, rate, luongSP, bhxhTru, truNghi, thucLanh, emp, phuCap, nghiKP, quyPL
  };
}

/* ---------- Customer debt rollup ---------- */
function debtOf(customerId){
  const cu=DB.customers.find(c=>c.id===customerId);
  const dauky=cu?num(cu.daukyNo):0;
  const txns=DB.debtTxns.filter(t=>t.customerId===customerId);
  let phatSinhTxn=0,thanhToan=0;
  txns.forEach(t=>{if(t.loai==='thanhtoan')thanhToan+=num(t.soTien);else phatSinhTxn+=num(t.soTien)});
  const phatSinh=dauky+phatSinhTxn;
  return {phatSinh,phatSinhTxn,dauky,thanhToan,conNo:phatSinh-thanhToan,count:txns.length};
}
function revenueOf(customerId,thang){
  return DB.revenues.filter(r=>r.customerId===customerId&&(!thang||r.thang===thang));
}

async function doLogin(){
  const u=document.getElementById('lg_user').value.trim();
  const p=document.getElementById('lg_pass').value;
  const err=document.getElementById('lg_err');
  if(!u||!p){err.textContent='Vui lòng nhập đủ tên đăng nhập và mật khẩu';return}
  const r=await attemptLogin(u,p);
  if(!r.ok){err.textContent=r.msg;document.getElementById('lg_pass').value='';return}
  document.body.classList.remove('auth-mode');
  document.body.innerHTML=APP_SHELL;
  renderNav();renderTopActions();go('dashboard');
  if(r.user.mustChangePassword) setTimeout(()=>changeMyPassword(true),300);
  else toast('Xin chào, '+r.user.hoTen);
}

function renderNav(){
  const nav=document.getElementById('nav');
  const eu=effectiveUser()||{};
  nav.innerHTML=NAV.map(g=>{
    const visible=g.items.filter(it=>{
      if(it.adminOnly) return isAdmin() && !isImpersonating();
      return canAccess(it.id);
    });
    if(!visible.length) return '';
    return `<div class="nav-group">
      <div class="nav-label">${g.group}</div>
      ${visible.map(it=>`<button class="nav-item ${CURRENT===it.id?'active':''}" onclick="go('${it.id}')">${svg(it.icon)}<span>${it.label}</span></button>`).join('')}
    </div>`;
  }).join('');
  // user card at bottom of nav (shows effective user)
  const initial=(eu.hoTen||'?').trim().split(/\s+/).pop().charAt(0).toUpperCase();

function go(id){

  document.getElementById('sidebar').classList.remove('open');

function render(){
  // Preserve focus across re-renders to fix search box typing issue
  const active=document.activeElement;
  const focusId=active && active.id;
  let selStart=null, selEnd=null;
  try{if(active && 'selectionStart' in active){selStart=active.selectionStart;selEnd=active.selectionEnd}}catch(e){}
  _renderInner();
  if(focusId){
    const el=document.getElementById(focusId);
    if(el && el!==document.activeElement){
      try{
        el.focus();
        if(selStart!=null && el.setSelectionRange){el.setSelectionRange(selStart,selEnd)}
      }catch(e){}
    }
  }
}
function _renderInner(){
  const c=document.getElementById('content');

function saveCustField(custId, field, value){
  const c=DB.customers.find(c=>c.id===custId);if(!c)return;
  const v=num(value)||0;
  if((num(c[field])||0)===v)return;
  c[field]=v;save();toast('Đã lưu '+({donGiaDB:'đơn giá ĐB',phiDichVu:'phí dịch vụ',phiQuyetToan:'phí quyết toán',phiKhac:'phí khác'}[field]||field));
}
function cksStatus(exp){
  if(!exp)return {html:'<span class="muted tiny">—</span>',days:null};
  const d=Math.round((new Date(exp)-new Date())/864e5);
  if(d<0)return {html:`<span class="badge b-red">Hết hạn ${esc(fmtDate(exp))}</span>`,days:d};
  if(d<45)return {html:`<span class="badge b-amber">Còn ${d} ngày</span>`,days:d};
  return {html:`<span class="tiny muted">${esc(fmtDate(exp))}</span>`,days:d};
}
function fmtDate(s){if(!s)return '';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`}

function delCustomer(id){
  const cu=DB.customers.find(c=>c.id===id);
  confirmModal(`Xóa khách hàng "${esc(cu.ten)}"?`,'Toàn bộ doanh thu & công nợ liên quan cũng sẽ bị xóa.',()=>{
    DB.customers=DB.customers.filter(c=>c.id!==id);
    DB.revenues=DB.revenues.filter(r=>r.customerId!==id);
    DB.debtTxns=DB.debtTxns.filter(t=>t.customerId!==id);
    DB.kpiRecords.forEach(k=>k.rows=(k.rows||[]).filter(r=>r.customerId!==id));
    save();render();toast('Đã xóa khách hàng');
  });
}

function credRow(label,user,pass){

}

function saveCustNote(cid,val){
  const cu=DB.customers.find(c=>c.id===cid);if(!cu)return;
  if((cu.ghiChuCongNo||'')===val)return;
  cu.ghiChuCongNo=val;save();toast('Đã lưu ghi chú');
}
function renderDebtLedger(txns){
  if(!txns.length)return `<tr><td colspan="6"><div class="empty">${svg(I.debt)}<div>Chưa có giao dịch công nợ</div></div></td></tr>`;
  // compute running balance in chronological order
  const chrono=[...txns].sort((a,b)=>a.ngay.localeCompare(b.ngay));
  let bal=0;const balMap={};
  chrono.forEach(t=>{bal+=(t.loai==='phatsinh'?num(t.soTien):-num(t.soTien));balMap[t.id]=bal});
  return txns.map(t=>`<tr>
    <td class="tiny">${esc(fmtDate(t.ngay))}</td>
    <td>${esc(t.noiDung||'')}</td>
    <td class="num">${t.loai==='phatsinh'?fmt(num(t.soTien)):'—'}</td>
    <td class="num">${t.loai==='thanhtoan'?'<span class="money pos">'+fmt(num(t.soTien))+'</span>':'—'}</td>
    <td class="num">${fmtMoney(balMap[t.id])}</td>
    <td><div style="display:flex;gap:2px"><button class="btn-icon" onclick="editDebt('${t.id}')">${svg(I.edit)}</button>
      <button class="btn-icon" onclick="delDebt('${t.id}')">${svg(I.trash)}</button></div></td>
  </tr>`).join('');
}

function delDebt(id){

/* ===================== TAX REPORT (quarterly tracking) ===================== */
function quarterOfMonth(m){return Math.ceil(m/3)}
function currentQuarter(){
  const d=new Date();
  return `${d.getFullYear()}-Q${quarterOfMonth(d.getMonth()+1)}`;
}
function listQuarters(){
  // Past 8 quarters + current
  const cur=currentQuarter();
  const [yy,qq]=cur.split('-Q').map(Number);
  const out=[];
  let y=yy,q=qq;
  for(let i=0;i<8;i++){out.push(`${y}-Q${q}`);q--;if(q<1){q=4;y--}}
  return out;
}
function getTaxReport(custId, ky){
  return DB.taxReports.find(t=>t.customerId===custId && t.ky===ky);
}
function ensureTaxReport(custId, ky){
  let t=getTaxReport(custId, ky);
  if(!t){t={id:uid(),customerId:custId,ky,bcThang:false,bcQuy:false,nopTC:false,doanhThu:0,gtgt:0,tncn:0,tndn:0,noThue:0,laiLo:0,ghiChu:''};DB.taxReports.push(t)}
  return t;
}
function saveTaxField(custId, ky, field, value){
  const t=ensureTaxReport(custId, ky);
  if(['bcThang','bcQuy','nopTC'].includes(field)) t[field]=!!value;
  else if(field==='ghiChu') t[field]=value;
  else t[field]=num(value)||0;
  save();
}

function periodToKy(p){
  if(p.type==='month')return p.m;                     // YYYY-MM
  if(p.type==='quarter')return p.q;                   // YYYY-QN
  if(p.type==='year')return p.y;                      // YYYY
  if(p.type==='range')return `${p.from}_${p.to}`;     // YYYY-MM-DD_YYYY-MM-DD
  return '';
}

function exportTaxReportCSV(){

  visibleCustomers().forEach((cu,i)=>{
    const t=getTaxReport(cu.id, ky) || {};
    rows.push([i+1, cu.ten, cu.mst||'', cu.xepLoai,
      t.bcThang?'X':'', t.bcQuy?'X':'', t.nopTC?'X':'',
      num(t.doanhThu)||0, num(t.gtgt)||0, num(t.tncn)||0, num(t.tndn)||0,
      num(t.noThue)||0, num(t.laiLo)||0, t.ghiChu||'']);
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>{
    const s=String(c);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `BaoCaoThue_${ky.replace(/[\/:]/g,'_')}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Đã xuất CSV');
}

/** Tính lại tồn quỹ tích lũy cho toàn bộ sổ quỹ (sau khi thêm/sửa/xóa) */
function recalcTonQuy(){
  const sorted=[...DB.cashbook].sort((a,b)=>(a.ngay||'').localeCompare(b.ngay||'')||(a.soct||'').localeCompare(b.soct||''));
  let ton=0;
  sorted.forEach(r=>{ton+=num(r.thu)-num(r.chi);r.tonQuy=ton;});
  DB.cashbook=sorted; // keep sorted order
  save();
}

  const tonDauKy = (() => {

      <div style="background:linear-gradient(135deg,#e8efef,#dfe9e7);border-radius:10px;padding:14px 16px;margin:4px 0">

        <div class="fld-row">
          <div class="fld"><label style="color:var(--green);font-weight:700">Thu (tiền vào quỹ)</label>
            <input id="cb_thu" inputmode="numeric" value="${existing&&num(existing.thu)?fmt(num(existing.thu)):''}" placeholder="0" onfocus="this.select();document.getElementById('cb_chi').value=''"
              style="border:2px solid var(--green);background:#f0faf2"></div>
          <div class="fld"><label style="color:var(--red);font-weight:700">Chi (tiền ra quỹ)</label>
            <input id="cb_chi" inputmode="numeric" value="${existing&&num(existing.chi)?fmt(num(existing.chi)):''}" placeholder="0" onfocus="this.select();document.getElementById('cb_thu').value=''"
              style="border:2px solid var(--red);background:#fff8f8"></div>
        </div>
      </div>
      <div class="fld"><label>Ghi chú / Diễn giải</label>
        <input id="cb_gc" value="${esc(existing?existing.ghiChu||'':'')}" placeholder="VD: Thu tiền dịch vụ kế toán tháng 6 · Chi mua văn phòng phẩm..."></div>
    </div>`,[
    {label:'Hủy',cls:'btn-ghost',fn:closeModal},
    {label:id?'Lưu thay đổi':'Nhập chứng từ',cls:'btn-primary',fn:()=>{
      const soct=val('cb_soct').trim();
      const ngay=val('cb_ngay');
      if(!soct){toast('Vui lòng nhập số chứng từ');return}
      if(!ngay){toast('Vui lòng chọn ngày');return}
      const thu=num(val('cb_thu'))||0;
      const chi=num(val('cb_chi'))||0;
      if(!thu&&!chi){toast('Vui lòng nhập số tiền Thu hoặc Chi');return}
      if(thu&&chi){toast('Chỉ điền Thu hoặc Chi, không điền cả hai');return}
      const obj={soct, ngay, thu, chi, tonQuy:0, ghiChu:val('cb_gc').trim()};
      if(id){Object.assign(existing,obj)}
      else{DB.cashbook.push({id:uid(),...obj})}
      recalcTonQuy(); // tự save bên trong
      closeModal();render();toast(id?'Đã cập nhật chứng từ':'Đã nhập chứng từ · Tồn quỹ đã tính lại');
    }}]);
}

function delCashbook(id){
  const r=DB.cashbook.find(x=>x.id===id);if(!r)return;
  confirmModal('Xóa chứng từ?',`Xóa chứng từ <b>${esc(r.soct)}</b> (${esc(r.ngay?fmtDate(r.ngay):'')})? Tồn quỹ sẽ được tính lại tự động.`,()=>{
    DB.cashbook=DB.cashbook.filter(x=>x.id!==id);
    recalcTonQuy();

}

function mucBarDouble(label,scoreS,scoreM,weight){
  const colM=scoreM>=80?'var(--green)':scoreM>=60?'var(--amber)':'var(--red)';
  return `<div>
    <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12.5px;font-weight:500">${label} <span class="muted tiny">(${Math.round(weight*100)}%)</span></span>
      <span style="font-size:11.5px"><span class="muted">NV ${pct(scoreS)}</span> · <b style="color:${colM}">QL ${pct(scoreM)}</b></span></div>
    <div class="bar"><i style="width:${Math.min(100,scoreM)}%;background:${colM}"></i></div>
  </div>`;
}
function mucBar(label,score,weight){return mucBarDouble(label,score,score,weight)}
function delKPI(id){
  confirmModal('Xóa kỳ KPI này?','Dữ liệu đánh giá của kỳ này sẽ bị xóa.',()=>{
    DB.kpiRecords=DB.kpiRecords.filter(r=>r.id!==id);UIST.kpiSel='';save();render();toast('Đã xóa kỳ KPI');
  });
}

        <span class="help">Mặc định chọn tất cả khách hàng. Có thể bỏ chọn ở bước nhập điểm.</span>

/* ----- Edit KPI scores (big form with NV + QL columns) ----- */
function editKPIScores(id){
  const rec=DB.kpiRecords.find(r=>r.id===id);
  const L=rec.luong||{};
  // Dual input pair: NV value + QL value (QL defaults to NV, auto-sync until manually changed)
  const dual=(v,rowIdx,path)=>{
    const sv=S(v); const mv=M(v);
    const isObj = (v!==null && typeof v==='object');
    const same = !isObj || sv===mv; // if legacy number or values equal → mgr starts untouched
    const rowAttr = rowIdx!==undefined?`data-row="${rowIdx}"`:'';
    return `<div class="ks-pair">
      <input class="kscore-self" inputmode="numeric" ${rowAttr} data-path="${path}" data-side="s" value="${sv===''||sv==null?'':sv}" placeholder="NV">
      <input class="kscore-mgr"  inputmode="numeric" ${rowAttr} data-path="${path}" data-side="m" value="${mv===''||mv==null?'':mv}" ${same?'':'data-touched="1"'} placeholder="= NV">
    </div>`;
  };
  const custCards=rec.rows.map((row,idx)=>{
    const cu=DB.customers.find(c=>c.id===row.customerId);if(!cu)return '';
    return `<details class="acc"><summary><span>${esc(cu.ten)} <span class="badge ${loaiClass(cu.xepLoai)}" style="margin-left:6px">${loaiLabel(cu.xepLoai)}</span></span><span class="muted tiny">${fmt(donGiaCustomer(cu))} đ</span></summary>

            <div class="ks-row"><label>Hóa đơn mua vào</label>${dual(row.a1m,idx,'a1m')}</div>
            <div class="ks-row"><label>Hóa đơn bán ra</label>${dual(row.a1b,idx,'a1b')}</div></div>
          <div><div class="tiny" style="font-weight:600;color:var(--navy);margin-bottom:6px">A2. Lao động, tiền lương (20%)</div>
            ${['Hạch toán lương','Lập bảng lương','BHXH','Thuế TNCN','HĐLĐ'].map((lb,j)=>`<div class="ks-row"><label>${lb}</label>${dual(row.a2[j],idx,'a2.'+j)}</div>`).join('')}</div>

      <div class="fld"><label>Số ngày nghỉ không phép</label><input class="ks-single" data-path="luong.nghiKhongPhep" inputmode="numeric" value="${L.nghiKhongPhep||0}"></div>
      <div class="fld"><label>Quỹ phúc lợi (VND)</label><input class="ks-single" data-path="luong.quyPhucLoi" inputmode="numeric" value="${L.quyPhucLoi||0}"></div>
    </div>
  `,[
    {label:'Hủy',cls:'btn-ghost',fn:closeModal},
    {label:'Lưu điểm',cls:'btn-primary',fn:()=>{saveKPIScores(id);closeModal();render();toast('Đã lưu điểm KPI')}}
  ],'wide');

  // Wire up auto-sync: when NV changes, QL follows unless QL was manually edited
  setTimeout(()=>{
    document.querySelectorAll('.kscore-self').forEach(self=>{
      const mgr=document.querySelector(`.kscore-mgr[data-path="${self.dataset.path}"]${self.dataset.row!==undefined?`[data-row="${self.dataset.row}"]`:''}`);
      if(!mgr)return;
      self.addEventListener('input',()=>{ if(!mgr.dataset.touched) mgr.value=self.value });
      mgr.addEventListener('input',()=>{ mgr.dataset.touched='1' });
    });
  },10);
}
function saveKPIScores(id){
  const rec=DB.kpiRecords.find(r=>r.id===id);
  // Group NV/QL inputs by path
  const collect={}; // {rowIdx|undef => {path => {s,m}}}
  document.querySelectorAll('.kscore-self,.kscore-mgr').forEach(inp=>{
    const ri=inp.dataset.row!==undefined?+inp.dataset.row:-1;
    const path=inp.dataset.path;
    if(!collect[ri])collect[ri]={};
    if(!collect[ri][path])collect[ri][path]={};
    const val=inp.value.trim()===''?'':num(inp.value);
    collect[ri][path][inp.dataset.side]=val;
  });
  // Apply
  Object.entries(collect).forEach(([ri,paths])=>{
    Object.entries(paths).forEach(([path,sm])=>{
      const score = mkScore(sm.s, sm.m);
      if(ri==='-1'){
        if(path.includes('.')){const[k,j]=path.split('.');rec[k][+j]=score}
        else{rec[path]=score}
      }else{
        const row=rec.rows[+ri];
        if(path.includes('.')){const[k,j]=path.split('.');row[k][+j]=score}
        else{row[path]=score}
      }
    });
  });
  // Salary singles
  document.querySelectorAll('.ks-single').forEach(inp=>{
    const[k,j]=inp.dataset.path.split('.');rec[k][j]=num(inp.value);
  });
  save();
}

function suggestUsername(emp){
  if(!emp) return '';
  const lastWord = (emp.hoTen||'').trim().split(/\s+/).pop()||'';
  const cleanLast = stripAccents(lastWord).toLowerCase().replace(/[^a-z0-9]/g,'');
  return `${(emp.id||'').toLowerCase()}.${cleanLast}`;
}

  if(emp){
    userInp.value=suggestUsername(emp);

function nextEmpId(){
  // Generate next 'NVxx' code by scanning existing IDs

  DB.employees.forEach(e=>{const m=/^NV(\d+)$/.exec(e.id||'');if(m){const n=parseInt(m[1],10);if(n>max)max=n}});
  return 'NV'+String(max+1).padStart(2,'0');
}

/* ===================== REPORTS & EXPORT (admin only) ===================== */
function loadXLSX(){
  return new Promise((resolve,reject)=>{
    if(window.XLSX) return resolve(window.XLSX);
    const s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    s.onload=()=>resolve(window.XLSX);
    s.onerror=()=>reject(new Error('Không tải được thư viện Excel — kiểm tra kết nối Internet hoặc dùng CSV'));
    document.head.appendChild(s);
  });
}

async function writeXLSX(filename, sheets){
  try{
    const XLSX=await loadXLSX();
    const wb=XLSX.utils.book_new();
    Object.entries(sheets).forEach(([name,rows])=>{
      const ws=XLSX.utils.aoa_to_sheet(rows);
      // Auto-size columns based on max content length per column
      if(rows.length){
        const colWidths=rows[0].map((_,colIdx)=>({
          wch: Math.min(50, Math.max(10, ...rows.map(r=>String(r[colIdx]==null?'':r[colIdx]).length+2)))
        }));
        ws['!cols']=colWidths;
      }
      XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31));
    });
    XLSX.writeFile(wb, filename+'.xlsx');
    return true;
  }catch(e){
    return false;
  }
}

function writeCSV(filename, rows){
  const csv='\uFEFF'+rows.map(r=>r.map(c=>{
    const s=c==null?'':String(c);
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=filename+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function buildRevenueReport(period){
  const rows=[['STT','Tháng','Tên khách hàng','Mã số thuế','Xếp loại','Doanh thu','Thuế GTGT','Thuế TNCN','Thuế TNDN','Chuyên viên phụ trách','Ghi chú']];
  let recs=[...DB.revenues];
  if(period) recs=recs.filter(r=>periodMatches(period, r.thang, `${r.thang}-01`));
  recs.sort((a,b)=>(b.thang||'').localeCompare(a.thang||'')||(a.customerId||'').localeCompare(b.customerId||''));
  recs.forEach((r,i)=>{
    const c=DB.customers.find(x=>x.id===r.customerId);
    const cv=c?DB.employees.find(e=>e.id===c.chuyenVienId):null;
    rows.push([
      i+1, r.thang||'',
      c?c.ten:'(Không xác định)', c?c.mst:'', c?(c.xepLoai==='DB'?'ĐB':c.xepLoai):'',
      num(r.doanhThu)||0, num(r.gtgt)||0, num(r.tncn)||0, num(r.tndn)||0,
      cv?cv.hoTen:'', r.ghiChu||''
    ]);
  });
  return rows;
}

function buildDebtReport(period){
  // Summary sheet (always shows all customers; debtOf is cumulative)
  const summary=[['STT','Tên khách hàng','Mã số thuế','Xếp loại','Đầu kỳ','Doanh thu (phải thu)','Đã thanh toán','Còn nợ','Số giao dịch','Chuyên viên phụ trách','Ghi chú công nợ']];
  DB.customers.forEach((c,i)=>{
    const d=debtOf(c.id);
    const cv=DB.employees.find(e=>e.id===c.chuyenVienId);
    summary.push([
      i+1, c.ten, c.mst||'', c.xepLoai==='DB'?'ĐB':c.xepLoai,
      d.dauky, d.phatSinh, d.thanhToan, d.conNo, d.count,
      cv?cv.hoTen:'', c.ghiChuCongNo||''
    ]);
  });
  // Compute totals
  let totDk=0,totPs=0,totTt=0,totNo=0;
  DB.customers.forEach(c=>{const d=debtOf(c.id);totDk+=d.dauky;totPs+=d.phatSinh;totTt+=d.thanhToan;totNo+=d.conNo});
  summary.push(['','TỔNG CỘNG','','',totDk,totPs,totTt,totNo,'','','']);

  // Detail sheet - filter txns by period if provided
  const detail=[['STT','Ngày','Tên khách hàng','Mã số thuế','Loại giao dịch','Số tiền','Nội dung']];
  let txns=[...DB.debtTxns];
  if(period){
    txns=txns.filter(t=>{
      if(!t.ngay) return false;
      const ym=t.ngay.slice(0,7);
      return periodMatches(period, ym, t.ngay);
    });
  }
  txns.sort((a,b)=>(b.ngay||'').localeCompare(a.ngay||''));
  txns.forEach((t,i)=>{
    const c=DB.customers.find(x=>x.id===t.customerId);
    detail.push([
      i+1, t.ngay||'',
      c?c.ten:'(KH đã xóa)', c?c.mst:'',
      t.loai==='thanhtoan'?'Thanh toán':'Phát sinh',
      num(t.soTien)||0, t.noiDung||''
    ]);
  });
  return {summary, detail};
}

function buildWalkinReport(period){
  const rows=[['STT','Ngày tạo','Tên khách hàng','Mã số thuế','Địa chỉ','Người liên hệ','Điện thoại','Nội dung công việc','Phí dịch vụ','Đã thanh toán','Còn nợ','Ghi chú']];
  let recs=[...DB.walkinCustomers];
  if(period) recs=recs.filter(w=>{
    if(!w.ngayTao) return false;
    const ym=w.ngayTao.slice(0,7);
    return periodMatches(period, ym, w.ngayTao);
  });
  recs.sort((a,b)=>(b.ngayTao||'').localeCompare(a.ngayTao||''));
  let totPhi=0,totTT=0,totNo=0;
  recs.forEach((w,i)=>{
    const phi=num(w.phiDichVu)||0, tt=num(w.daThanhToan)||0, no=phi-tt;
    totPhi+=phi; totTT+=tt; totNo+=no;
    rows.push([
      i+1, w.ngayTao||'',
      w.ten||'', w.mst||'', w.diaChi||'',
      w.nguoiLienHe||'', w.dienThoai||'',
      w.noiDungCongViec||'',
      phi, tt, no,
      w.ghiChu||''
    ]);
  });
  if(recs.length) rows.push(['','','TỔNG CỘNG','','','','','',totPhi,totTT,totNo,'']);
  return rows;
}

function buildCashbookReport(period){
  let recs=[...DB.cashbook].sort((a,b)=>(a.ngay||'').localeCompare(b.ngay||'')||(a.soct||'').localeCompare(b.soct||''));
  let tonDauKy=0;
  if(period){
    const inPeriod=recs.filter(r=>r.ngay && periodMatches(period, r.ngay.slice(0,7), r.ngay));
    const firstInPeriod=inPeriod.length?inPeriod[0]:null;
    if(firstInPeriod){
      const before=recs.filter(r=>r.ngay && r.ngay < firstInPeriod.ngay);
      tonDauKy=before.length?num(before[before.length-1].tonQuy):0;
    }
    recs=inPeriod;
  }
  const rows=[['STT','Số chứng từ','Ngày','Thu','Chi','Tồn quỹ','Ghi chú']];
  if(period&&tonDauKy!==0) rows.push(['','','Số dư đầu kỳ chuyển sang','','',tonDauKy,'']);
  let totThu=0,totChi=0;
  recs.forEach((r,i)=>{
    const thu=num(r.thu)||0, chi=num(r.chi)||0;
    totThu+=thu; totChi+=chi;
    rows.push([i+1, r.soct||'', r.ngay||'', thu||'', chi||'', num(r.tonQuy)||0, r.ghiChu||'']);
  });
  if(recs.length) rows.push(['','','TỔNG CỘNG',totThu,totChi,num((recs[recs.length-1]||{}).tonQuy)||0,'']);
  return rows;
}

async function exportReport(type){
  const today=todayDate();
  const p=UIST.reportPeriod;
  const pSuffix = p ? '_'+periodLabel(p).replace(/[^\d]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'') : '';
  if(type==='customers'){
    const rows=buildCustomerReport();
    const fn=`DanhSachKhachHang_${today}`;
    const ok=await writeXLSX(fn, {'Danh sách KH':rows});
    if(!ok){writeCSV(fn, rows);toast('Đã xuất CSV (không tải được Excel)')}
    else toast('Đã xuất file Excel danh sách KH');
  }else if(type==='debt'){
    const {summary,detail}=buildDebtReport(p);
    const fn=`CongNo_${today}${pSuffix}`;
    const ok=await writeXLSX(fn, {'Tổng hợp công nợ':summary,'Chi tiết giao dịch':detail});
    if(!ok){writeCSV(`CongNo_TongHop_${today}${pSuffix}`, summary);writeCSV(`CongNo_ChiTiet_${today}${pSuffix}`, detail);toast('Đã xuất 2 file CSV (không tải được Excel)')}
    else toast('Đã xuất file Excel công nợ'+(p?` (${periodLabel(p)})`:'')+' (2 sheet)');
  }else if(type==='walkin'){
    const rows=buildWalkinReport(p);
    const fn=`KhachHangVangLai_${today}${pSuffix}`;
    const ok=await writeXLSX(fn, {'KH vãng lai':rows});
    if(!ok){writeCSV(fn, rows);toast('Đã xuất CSV (không tải được Excel)')}
    else toast('Đã xuất file Excel khách vãng lai'+(p?` (${periodLabel(p)})`:''));
  }else if(type==='cashbook'){
    const rows=buildCashbookReport(p);
    const fn=`SoQuyTienMat_${today}${pSuffix}`;
    const ok=await writeXLSX(fn, {'Sổ quỹ tiền mặt':rows});
    if(!ok){writeCSV(fn, rows);toast('Đã xuất CSV (không tải được Excel)')}
    else toast('Đã xuất file Excel sổ quỹ tiền mặt'+(p?` (${periodLabel(p)})`:''));
  }
}

      const np=val('acp_new');if(!np||np.length<4){toast('Mật khẩu tối thiểu 4 ký tự');return}
      u.passwordHash=await sha256(np);
      if(document.getElementById('acp_force').checked) u.mustChangePassword=true; else delete u.mustChangePassword;
      save();closeModal();toast('Đã đổi mật khẩu cho '+u.username);
    }}]);
}

function editUser(id){
  const isNew=!id;
  const u = id ? DB.users.find(x=>x.id===id) : {role:'user',permissions:defaultPerms(),active:true};
  if(id && !u){toast('Không tìm thấy người dùng');return}
  const labels={dashboard:'Tổng quan',customersAll:'Danh sách KH tổng hợp (xem tất cả)',customersMine:'Danh sách KH theo phân công (chỉ KH mình phụ trách)',walkin:'Khách hàng vãng lai',cashbook:'Sổ quỹ tiền mặt',debt:'Theo dõi công nợ',taxReport:'Báo cáo thuế tháng/quý',kpi:'KPI & Lương',kpiSummary:'Tổng hợp KPI',journal:'Nhật ký'};
  openModal(isNew?'Tạo người dùng mới':'Sửa người dùng',`
    <div class="form-grid">
      ${isNew?`<div class="fld" style="background:var(--blue-bg);padding:12px 14px;border-radius:10px;margin-bottom:4px"><label style="color:#1c4e80;font-weight:600">Chọn nhân viên — tên đăng nhập sẽ được tự động đề xuất</label>
        <select id="u_emp_pick" onchange="autofillUserFromEmp()" style="background:#fff">
          <option value="">— Tạo tài khoản không liên kết —</option>
          ${DB.employees.map(e=>`<option value="${e.id}">${esc(e.id)} · ${esc(e.hoTen)}${e.viTri?` (${esc(e.viTri)})`:''}</option>`).join('')}
        </select>
        <span class="help" style="color:#1c4e80">Tên đăng nhập = <code>mã NV . tên</code> (vd: <code>nv01.tran</code>) — vẫn có thể sửa thủ công</span></div>`:''}
      <div class="fld-row">
        <div class="fld"><label>Tên đăng nhập <span class="req">*</span></label>
          <input id="u_user" value="${esc(u.username||'')}" ${id?'disabled':''} placeholder="vd: nv01.tran" autocomplete="off">
          ${id?'<span class="help">Không thể đổi tên đăng nhập</span>':'<span class="help">Tối thiểu 3 ký tự, không dấu, không khoảng trắng</span>'}</div>
        <div class="fld"><label>Họ và tên</label><input id="u_ten" value="${esc(u.hoTen||'')}"></div>
      </div>
      <div class="fld"><label>Email <span class="muted tiny">(dùng cho khôi phục mật khẩu)</span></label><input id="u_email" type="email" value="${esc(u.email||'')}" placeholder="ban@example.com"></div>
      ${isNew?`<div class="fld"><label>Mật khẩu ban đầu <span class="req">*</span></label><input id="u_pwd" type="text" placeholder="Tối thiểu 4 ký tự"><span class="help">Người dùng nên đổi mật khẩu sau lần đăng nhập đầu tiên</span></div>`:''}
      <div class="fld-row">
        <div class="fld"><label>Vai trò</label><select id="u_role" onchange="document.getElementById('permGrid').style.display=this.value==='admin'?'none':'block'">
          <option value="user" ${u.role==='user'?'selected':''}>Người dùng (cần phân quyền cụ thể)</option>
          <option value="admin" ${u.role==='admin'?'selected':''}>Quản trị viên (toàn quyền)</option>
        </select></div>
        <div class="fld"><label>Trạng thái</label><select id="u_active">
          <option value="1" ${u.active!==false?'selected':''}>Đang hoạt động</option>
          <option value="0" ${u.active===false?'selected':''}>Khóa tài khoản</option>
        </select></div>
      </div>
      <div class="fld"><label>Liên kết nhân viên${isNew?'':' (tùy chọn)'}</label><select id="u_emp">
        <option value="">— Không liên kết —</option>
        ${DB.employees.map(e=>`<option value="${e.id}" ${u.employeeId===e.id?'selected':''}>${esc(e.id)} · ${esc(e.hoTen)}</option>`).join('')}
      </select><span class="help">Liên kết với hồ sơ nhân viên để theo dõi KPI${isNew?' — chọn ở trên để auto-fill, hoặc đổi tại đây':''}</span></div>
      <div id="permGrid" style="display:${u.role==='admin'?'none':'block'}">
        <div class="sec-title" style="margin:6px 0">Phân quyền truy cập phân hệ<div class="ln"></div></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
          ${ALL_PAGES.map(p=>{const checked=(u.permissions||{})[p]!==false;
            return `<label class="perm-chip"><input type="checkbox" class="u_perm" data-p="${p}" ${checked?'checked':''}>${labels[p]}</label>`}).join('')}
        </div>
        <div class="muted tiny" style="margin-top:10px"><b>Lưu ý:</b> Tham số cài đặt và Quản trị người dùng chỉ dành cho Quản trị viên — không cấp được cho người dùng thường.</div>
      </div>
    </div>`,[
    {label:'Hủy',cls:'btn-ghost',fn:closeModal},
    {label:isNew?'Tạo người dùng':'Lưu thay đổi',cls:'btn-primary',fn:async()=>{
      const username=val('u_user').trim().toLowerCase();
      const hoTen=val('u_ten').trim();
      const email=val('u_email').trim().toLowerCase();
      const role=val('u_role');
      const active=val('u_active')==='1';
      const employeeId=val('u_emp')||null;
      const perms={};document.querySelectorAll('.u_perm').forEach(cb=>perms[cb.dataset.p]=cb.checked);
      if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Email không hợp lệ');return}
      if(isNew){
        if(!username||!/^[a-z0-9_.]{3,}$/i.test(username)){toast('Tên đăng nhập tối thiểu 3 ký tự, không dấu/khoảng trắng');return}
        if(DB.users.some(x=>x.username===username)){toast('Tên đăng nhập đã tồn tại');return}
        const pwd=val('u_pwd');if(!pwd||pwd.length<4){toast('Mật khẩu tối thiểu 4 ký tự');return}
        const passwordHash=await sha256(pwd);
        DB.users.push({id:uid(),username,passwordHash,hoTen,email,role,permissions:role==='admin'?defaultPerms():perms,employeeId,active,createdAt:todayDate()});
      }else{
        const otherAdmins=DB.users.filter(x=>x.id!==u.id&&x.role==='admin'&&x.active!==false);
        if(!otherAdmins.length && (role!=='admin'||!active)){toast('Phải có ít nhất 1 quản trị viên đang hoạt động');return}
        Object.assign(u,{hoTen,email,role,permissions:role==='admin'?defaultPerms():perms,employeeId,active});
        if(CURRENT_USER && CURRENT_USER.id===u.id) CURRENT_USER=u;
      }
      save();closeModal();render();renderNav();toast(isNew?'Đã tạo người dùng':'Đã cập nhật người dùng');
    }}],'wide');
}
function delUser(id){
  const u=DB.users.find(x=>x.id===id);if(!u)return;
  if(CURRENT_USER && u.id===CURRENT_USER.id){toast('Không thể tự xóa tài khoản của mình');return}
  if(u.role==='admin' && DB.users.filter(x=>x.role==='admin'&&x.active!==false).length<=1){toast('Phải còn ít nhất 1 quản trị viên');return}
  confirmModal(`Xóa người dùng "${esc(u.username)}"?`,'Tài khoản này sẽ bị xóa vĩnh viễn.',()=>{
    DB.users=DB.users.filter(x=>x.id!==id);save();render();toast('Đã xóa người dùng');
  });
}
function resetUserPwd(id){
  const u=DB.users.find(x=>x.id===id);if(!u)return;
  openModal('Đặt lại mật khẩu',`<div class="form-grid">
    <div>Đặt mật khẩu mới cho <b>${esc(u.username)}</b> (${esc(u.hoTen||'')}):</div>
    <div class="fld"><label>Mật khẩu mới <span class="req">*</span></label><input id="rp_new" type="text" placeholder="Tối thiểu 4 ký tự"></div>
    <div class="muted tiny">Người dùng nên được khuyến cáo đổi lại mật khẩu sau khi đăng nhập.</div>
  </div>`,[
    {label:'Hủy',cls:'btn-ghost',fn:closeModal},
    {label:'Đặt lại',cls:'btn-primary',fn:async()=>{
      const np=val('rp_new');if(!np||np.length<4){toast('Mật khẩu tối thiểu 4 ký tự');return}
      u.passwordHash=await sha256(np);u.mustChangePassword=true;save();closeModal();toast('Đã đặt lại mật khẩu');
    }}]);
}
function changeMyPassword(forced){
  if(!CURRENT_USER)return;
  openModal('Đổi mật khẩu của bạn',`
    <div class="form-grid">
      ${forced?`<div style="background:var(--amber-bg);color:#7a5a0d;padding:12px 14px;border-radius:9px;font-size:13px"><b>Đây là lần đăng nhập đầu tiên với mật khẩu mặc định.</b><br>Vui lòng đổi mật khẩu để đảm bảo bảo mật.</div>`:''}
      ${!forced?`<div class="fld"><label>Mật khẩu hiện tại <span class="req">*</span></label><input id="cp_old" type="password" autocomplete="current-password"></div>`:''}
      <div class="fld"><label>Mật khẩu mới <span class="req">*</span></label><input id="cp_new" type="password" autocomplete="new-password"></div>
      <div class="fld"><label>Nhập lại mật khẩu mới</label><input id="cp_new2" type="password" autocomplete="new-password"></div>
    </div>`,[
    ...(forced?[]:[{label:'Hủy',cls:'btn-ghost',fn:closeModal}]),
    {label:'Đổi mật khẩu',cls:'btn-primary',fn:async()=>{
      if(!forced){const oldH=await sha256(val('cp_old'));if(oldH!==CURRENT_USER.passwordHash){toast('Sai mật khẩu hiện tại');return}}
      const np=val('cp_new'),np2=val('cp_new2');
      if(!np||np.length<4){toast('Mật khẩu mới tối thiểu 4 ký tự');return}
      if(np!==np2){toast('Hai lần nhập không khớp');return}
      const u=DB.users.find(x=>x.id===CURRENT_USER.id);
      u.passwordHash=await sha256(np);delete u.mustChangePassword;CURRENT_USER=u;
      save();closeModal();toast('Đã đổi mật khẩu thành công');
    }}]);
}
